<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#000000">
  <meta name="description" content="Daniel Vélez — Programación Web · Diseño UX/UI · Motion Graphics. Muy pronto 2026.">
  <meta property="og:title" content="Daniel Vélez | Muy Pronto 2026">
  <title>Daniel Vélez | Muy Pronto 2026</title>
  <link rel="stylesheet" href="style.css">
  <script src="script.js" defer></script>
</head>

<body>

  <!-- Textura de película / grano -->
  <div class="film-grain" aria-hidden="true"></div>

  <!-- Marco holográfico -->
  <div class="holo-frame" aria-hidden="true"></div>

  <!-- Cursor glow -->
  <div id="cursor-glow" aria-hidden="true"></div>

  <!-- Estrellas sparkle decorativas -->
  <!-- Esquina superior izquierda - grande -->
  <img class="sparkle sp-tl-lg" src="rsc/svg/sparkle-lg.svg" alt="" aria-hidden="true">
  <!-- Esquina superior derecha - grande -->
  <img class="sparkle sp-tr-lg" src="rsc/svg/sparkle-lg.svg" alt="" aria-hidden="true">
  <!-- Esquina inferior izquierda - mediana -->
  <img class="sparkle sp-bl-md" src="rsc/svg/sparkle-sm.svg" alt="" aria-hidden="true">
  <!-- Esquina inferior derecha - mediana -->
  <img class="sparkle sp-br-md" src="rsc/svg/sparkle-sm.svg" alt="" aria-hidden="true">
  <!-- Centro derecha - pequeña -->
  <img class="sparkle sp-cr-sm" src="rsc/svg/sparkle-sm.svg" alt="" aria-hidden="true">
  <!-- Centro izquierda - pequeña -->
  <img class="sparkle sp-cl-sm" src="rsc/svg/sparkle-sm.svg" alt="" aria-hidden="true">
  <!-- Arriba centro - extra pequeña -->
  <img class="sparkle sp-tc-xs" src="rsc/svg/sparkle-sm.svg" alt="" aria-hidden="true">
  <!-- Abajo centro derecha - extra pequeña -->
  <img class="sparkle sp-bc-xs" src="rsc/svg/sparkle-sm.svg" alt="" aria-hidden="true">

  <main class="site-wrap">

    <!-- Nombre principal -->
    <h1 class="name-display" aria-label="Daniel Velez">
      <span class="name-line">DANIEL</span>
      <span class="name-line">VELEZ</span>
    </h1>

    <!-- Tira inferior -->
    <footer class="bottom-strip">
      <div class="coming-block">
        <span class="coming-label">MUY PRONTO</span>
        <span class="coming-year">2026</span>
      </div>

      <div class="center-block">
        <p class="services-list">PROGRAMACION WEB / DISEÑO UX / UI / MOTION GRAPHICS / Y MAS....</p>
        <a href="mailto:contacto@danielvelez.dev" class="btn-contacto magnetic">CONTACTO</a>
        <p id="success-msg" class="success-msg sr-only" role="status" aria-live="polite"></p>
      </div>

      <div class="social-block">
        <a href="#" class="social-link">LI</a>
        <a href="#" class="social-link">GH</a>
        <a href="#" class="social-link">IG</a>
      </div>
    </footer>

  </main>
</body>

</html>
